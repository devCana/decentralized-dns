# Decentralized DNS — local end-to-end topology (HLD §4.4).
#
#   docker compose up --build
#
# Brings up a local Hardhat chain, deploys + seeds the contracts, then starts
# the Go resolver wired to them. The resolver auto-detects the contract
# addresses from the shared deployments volume, so no manual configuration is
# needed. Query it at http://localhost:8080 once it is healthy.
services:
  chain:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./contracts:/app
    command: sh -c "npm install && npx hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8545',{method:'POST',headers:{'content-type':'application/json'},body:'{\\\"jsonrpc\\\":\\\"2.0\\\",\\\"id\\\":1,\\\"method\\\":\\\"eth_chainId\\\"}'}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  # One-shot: deploy + seed the contracts against the chain, writing the
  # addresses to the shared `deployments` volume the resolver reads.
  deployer:
    image: node:22-bookworm-slim
    working_dir: /app
    depends_on:
      chain:
        condition: service_healthy
    environment:
      RPC_URL: http://chain:8545
    volumes:
      - ./contracts:/app
      - deployments:/app/deployments
    command: >
      sh -c "npm install &&
             npx hardhat run scripts/deploy.ts --network localhost &&
             npx hardhat run scripts/seed.ts --network localhost"

  resolver:
    build:
      context: ./resolver
    depends_on:
      deployer:
        condition: service_completed_successfully
    environment:
      RPC_URL: http://chain:8545
      DEPLOYMENTS: /deployments/localhost.json
      DATA_DIR: /home/nonroot/data
      RESOLVER_KEYSTORE: /home/nonroot/resolver.key
      REST_PORT: "8080"
      UDP_PORT: "5353"
      ALLOW_PEER_HINTS: "true"
    volumes:
      - deployments:/deployments:ro
    ports:
      - "8080:8080"
      - "5353:5353/udp"

volumes:
  deployments:
